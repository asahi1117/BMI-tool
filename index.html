<!DOCTYPE html>
<html lang="ja">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI計算ツール</title>
    <script src="https://cdn.tailwindcss.com"></script>
    </head>
    <body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

    <div class="bg-purple-200 rounded-lg shadow p-8 w-full max-w-md">
        <h1 class="text-3xl text-center font-bold mb-6 text-blue-500">BMI計算ツール</h1>

        <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">身長 (cm)</label>
        <input id="height" type="number" placeholder="例：170"
            class="w-full border border-gray-300 rounded px-3 py-2">
        </div>

        <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-1">体重 (kg)</label>
        <input id="weight" type="number" placeholder="例：65"
            class="w-full border border-gray-300 rounded px-3 py-2">
        </div>

        <button id="calcBtn"
        class="w-full bg-blue-500 text-white font-bold py-2 rounded-3xl hover:bg-blue-700 transition">
        計算する
        </button>

        <p id="result" class="mt-6 text-center text-lg font-bold text-orange-600"></p>
    </div>

    <script>
        function calcBmi(height, weight) {
        const heightM = height / 100;
        return weight / (heightM * heightM);
        }

        function getJudgment(bmi) {
        if (bmi <= 16 || bmi >= 30) {
        return "危険";
            } else if (bmi < 18.5) {
        return "痩せ型";
            } else if (bmi < 25) {
        return "普通";
            } else {
        return "肥満";
        }
        }

        const button = document.querySelector("#calcBtn");
        const result = document.querySelector("#result");

        button.addEventListener("click", () => {
        const height = Number(document.querySelector("#height").value);
        const weight = Number(document.querySelector("#weight").value);

        if (height <= 0 || weight <= 0) {
            result.textContent = "例に従って身長と体重を入力して下さい";
            return;
        }

        const bmi = calcBmi(height, weight);
        const judgment = getJudgment(bmi);

        let message = "BMI: " + bmi.toFixed(1) + "（" + judgment + "）";  

    if (judgment === "危険") { 
        message = message + '<span style="color: red;"> 医師への相談をおすすめします</span>'; 
    }

    result.innerHTML = message;
        });
    </script>

    </body>
</html>
